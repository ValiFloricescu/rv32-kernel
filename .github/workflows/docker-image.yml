name: Build RISCOF image

# Ruleaza manual (Actions -> Run workflow) sau la modificarea Dockerfile-ului.
on:
  workflow_dispatch:
  push:
    paths: [ "docker/Dockerfile", ".github/workflows/docker-image.yml" ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          push: true
          tags: ghcr.io/valifloricescu/riscof-pipe5:latest
