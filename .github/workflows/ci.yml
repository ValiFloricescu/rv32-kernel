name: CI

# Ruleaza la ORICE push si pull request.
on: [push, pull_request]

jobs:
  # ---- Regresie interna: compileaza + ruleaza TOATE testbench-urile (self-checking) ----
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y iverilog
      - run: make            # esueaza automat daca vreun tb nu da ">>> PASS <<<"

  # ---- Gardian de sintetizabilitate: esueaza la latch-uri sau erori de elaborare ----
  synthesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y yosys
      - run: ./scripts/check_synth.sh

  # ---- Conformitate RISCOF pe imaginea proprie (gateaza pe I + M + A) ----
  riscof:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/valifloricescu/riscof-pipe5:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Genereaza config.ini cu caile reale
        run: sed "s#__ROOT__#$GITHUB_WORKSPACE#g" riscof/config.ci.ini > riscof/config.gen.ini
      - name: RISCOF - suita I
        run: cd riscof && riscof run --config=config.gen.ini --suite=$RISCV_ARCH_TEST/riscv-test-suite/rv32i_m/I --env=$RISCV_ARCH_TEST/riscv-test-suite/env --no-browser
      - name: RISCOF - suita M
        run: cd riscof && riscof run --config=config.gen.ini --suite=$RISCV_ARCH_TEST/riscv-test-suite/rv32i_m/M --env=$RISCV_ARCH_TEST/riscv-test-suite/env --no-browser
      - name: RISCOF - suita A
        run: cd riscof && riscof run --config=config.gen.ini --suite=$RISCV_ARCH_TEST/riscv-test-suite/rv32i_m/A --env=$RISCV_ARCH_TEST/riscv-test-suite/env --no-browser
      - name: Salveaza raportul RISCOF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscof-report
          path: riscof/riscof_work/report.html
