name: CI

on:
  push:
  pull_request:

jobs:
  # ---- Regresia interna ----
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y iverilog
      - run: make

  # ---- Conformitate RISCOF pe imaginea proprie ----
  riscof:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ValiFloricescu/riscof-pipe5:latest 
    steps:
      - uses: actions/checkout@v4
      - name: Genereaza config.ini cu caile reale
        run: sed "s#__ROOT__#$GITHUB_WORKSPACE#g" riscof/config.ci.ini > riscof/config.gen.ini
      - name: RISCOF - suita I
        run: |
          cd riscof
          riscof run --config=config.gen.ini \
            --suite=$RISCV_ARCH_TEST/riscv-test-suite/rv32i_m/I \
            --env=$RISCV_ARCH_TEST/riscv-test-suite/env --no-browser
      - name: RISCOF - suita M
        run: |
          cd riscof
          riscof run --config=config.gen.ini \
            --suite=$RISCV_ARCH_TEST/riscv-test-suite/rv32i_m/M \
            --env=$RISCV_ARCH_TEST/riscv-test-suite/env --no-browser
      - name: Salveaza raportul RISCOF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscof-report
          path: riscof/riscof_work/report.html
