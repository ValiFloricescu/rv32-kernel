; config RISCOF pentru CI. Referinta = Spike.
; /work se inlocuieste cu radacina checkout-ului (workflow-ul face sed).
[RISCOF]
ReferencePlugin=spike
ReferencePluginPath=/work/riscof/spike
DUTPlugin=pipe5
DUTPluginPath=/work/riscof/pipe5

[pipe5]
pluginpath=/work/riscof/pipe5
ispec=/work/riscof/pipe5/pipe5_isa.yaml
pspec=/work/riscof/pipe5/pipe5_platform.yaml
pipe5_root=/work
target_run=1
jobs=4

[spike]
pluginpath=/work/riscof/spike
ispec=/work/riscof/pipe5/pipe5_isa.yaml
pspec=/work/riscof/pipe5/pipe5_platform.yaml
PATH=/opt/spike/bin
make=make
