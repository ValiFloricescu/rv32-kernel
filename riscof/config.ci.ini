; config RISCOF pentru CI. Referinta = Spike.
; __ROOT__ se inlocuieste cu radacina checkout-ului (workflow-ul face sed).
[RISCOF]
ReferencePlugin=spike
ReferencePluginPath=__ROOT__/riscof/spike
DUTPlugin=pipe5
DUTPluginPath=__ROOT__/riscof/pipe5

[pipe5]
pluginpath=__ROOT__/riscof/pipe5
ispec=__ROOT__/riscof/pipe5/pipe5_isa.yaml
pspec=__ROOT__/riscof/pipe5/pipe5_platform.yaml
pipe5_root=__ROOT__
target_run=1
jobs=4

[spike]
pluginpath=__ROOT__/riscof/spike
ispec=__ROOT__/riscof/pipe5/pipe5_isa.yaml
pspec=__ROOT__/riscof/pipe5/pipe5_platform.yaml
PATH=/opt/spike/bin
make=make
